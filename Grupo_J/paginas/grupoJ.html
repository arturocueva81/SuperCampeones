<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FIFA World Cup 2026 - Grupo I</title>
  <link rel="stylesheet" href="grupoJ.css" />
</head>
<body>

  <header>
    <a href="../../menuPaginas/grupos/grupos.html" class="btn-grupos">← Volver a Grupos</a>
    <h1>🏆 FIFA World Cup 2026</h1>
    <h2>Grupo I</h2>
  </header>

  <main>
    <section class="grupo-container">

      <div class="equipo-card" data-equipo="Argentina">
        <img src="../img/banderaArgentina.png" alt="Bandera Argentina" />
        <h3>Argentina</h3>
        <span class="badge conmebol">CONMEBOL</span>
      </div>

      <div class="equipo-card" data-equipo="Argelia">
        <img src="../img/banderaArgelia.png" alt="Bandera Argelia" />
        <h3>Argelia</h3>
        <span class="badge caf">CAF</span>
      </div>

      <div class="equipo-card" data-equipo="Austria">
        <img src="../img/banderaAustria.png" alt="Bandera Austria" />
        <h3>Austria</h3>
        <span class="badge uefa">UEFA</span>
      </div>

      <div class="equipo-card" data-equipo="Jordania">
        <img src="../img/banderaJordania.png" alt="Bandera Jordania" />
        <h3>Jordania</h3>
        <span class="badge afc">AFC</span>
      </div>

    </section>

    <div id="info-panel" class="info-panel oculto">
      <p id="info-texto"></p>
      <button onclick="cerrarPanel()">✖ Cerrar</button>
    </div>
  </main>

  <footer>
    <p>SuperCampeones © 2026 | Taller Mundialista</p>
  </footer>

  <script src="grupoJ.js"></script>
</body>
</html>
