<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FIFA World Cup 2026 - Grupo C</title>
  <link rel="stylesheet" href="grupoC.css" />
</head>
<body>

  <header>
    <a href="../../menuPaginas/grupos/grupos.html" class="btn-grupos">← Volver a Grupos</a>
    <h1>🏆 FIFA World Cup 2026</h1>
    <h2>Grupo C</h2>
  </header>

  <main>
    <section class="grupo-container">

      <div class="equipo-card" data-equipo="Brasil">
        <img src="../img/banderaBrasil.png" alt="Bandera Brasil" />
        <h3>Brasil</h3>
        <span class="badge">CONMEBOL</span>
      </div>

      <div class="equipo-card" data-equipo="Marruecos">
        <img src="../img/banderaMarruecos.png" alt="Bandera Marruecos" />
        <h3>Marruecos</h3>
        <span class="badge">CAF</span>
      </div>

      <div class="equipo-card" data-equipo="Haití">
        <img src="../img/banderaHaiti.png" alt="Bandera Haiti" />
        <h3>Haití </h3>
        <span class="badge">CONCACAF</span>
      </div>

      <div class="equipo-card" data-equipo="Escocia">
        <img src="../img/banderaEscocia.png" alt="Bandera Escocia" />
        <h3>Escocia</h3>
        <span class="badge">UEFA</span>
      </div>

    </section>

    <div id="info-panel" class="info-panel oculto">
      <p id="info-texto"></p>
      <button onclick="cerrarPanel()">✖ Cerrar</button>
    </div>
  </main>

  <footer>
    <p>SuperCampeones © 2026 | Taller Mundialista</p>
  </footer>

  <script src="grupoC.js"></script>
</body>
</html>
